<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astrax AI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#050505;
color:white;
text-align:center;
}

header{
padding:20px;
font-size:28px;
font-weight:bold;
color:#00ffcc;
letter-spacing:2px;
}

.hero{
padding:100px 20px;
}

.hero h1{
font-size:60px;
margin-bottom:20px;
}

.hero p{
font-size:22px;
color:#aaa;
margin-bottom:35px;
}

button{
padding:15px 35px;
font-size:18px;
border:none;
border-radius:10px;
background:#00ff99;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
background:#00cc77;
}

.features{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:50px 30px;
}

.card{
background:#111;
padding:25px;
border-radius:14px;
box-shadow:0 0 10px rgba(0,255,150,0.15);
}

.card h3{
margin-bottom:10px;
color:#00ffcc;
}

footer{
padding:30px;
color:#666;
font-size:14px;
}
</style>
</head>

<body>

<header>ASTRAX AI</header>

<section class="hero">
<h1>The Future is Here 🚀</h1>
<p>Smart • Honest • Powerful AI Assistant</p>
<button>Start Chat</button>
</section>

<section class="features">

<div class="card">
<h3>⚡ Prompt Enhance</h3>
<p>Weak prompt ko smart bana dega.</p>
</div>

<div class="card">
<h3>🧠 Quick / Deep</h3>
<p>Fast ya detailed answers instantly.</p>
</div>

<div class="card">
<h3>🎙 Voice Mode</h3>
<p>Bolo aur jawab suno.</p>
</div>

<div class="card">
<h3>🔁 Reverify</h3>
<p>Answer ko dubara verify karo.</p>
</div>

</section>

<footer>
© 2026 Astrax AI
</footer>

</body>
</html>
