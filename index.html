<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astrax AI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#050505;
color:white;
}

.container{
display:flex;
height:100vh;
}

/* Sidebar */
.sidebar{
width:250px;
background:#0d0d0d;
padding:20px;
border-right:1px solid #222;
}

.logo{
font-size:28px;
font-weight:bold;
color:#00ffcc;
margin-bottom:20px;
}

.newchat{
width:100%;
padding:14px;
background:#00ff99;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
margin-bottom:25px;
}

.recent{
color:#777;
font-size:14px;
margin-bottom:10px;
}

.chatitem{
background:#111;
padding:12px;
border-radius:10px;
margin-bottom:10px;
font-size:14px;
}

/* Main */
.main{
flex:1;
display:flex;
flex-direction:column;
}

.topbar{
padding:20px;
border-bottom:1px solid #222;
font-size:26px;
font-weight:bold;
color:#00ffcc;
}

.messages{
flex:1;
padding:25px;
overflow:auto;
}

.bot{
background:#111;
padding:14px;
border-radius:14px;
max-width:700px;
margin-bottom:15px;
line-height:1.5;
}

.user{
background:#00ff99;
color:black;
padding:14px;
border-radius:14px;
max-width:500px;
margin-left:auto;
margin-bottom:15px;
font-weight:bold;
}

.inputbox{
display:flex;
gap:10px;
padding:20px;
border-top:1px solid #222;
}

input{
flex:1;
padding:16px;
background:#111;
color:white;
border:none;
border-radius:12px;
font-size:16px;
outline:none;
}

button{
padding:16px 24px;
background:#00ff99;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

@media(max-width:800px){
.sidebar{
display:none;
}
}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">
<div class="logo">ASTRAX</div>

<button class="newchat" onclick="newChat()">+ New Chat</button>

<div class="recent">Recent Chats</div>

<div class="chatitem">Startup ideas</div>
<div class="chatitem">How to earn online?</div>
<div class="chatitem">Best coding laptop</div>

</div>

<div class="main">

<div class="topbar">ASTRAX CHAT</div>

<div class="messages" id="chat">

<div class="bot">👋 Hello! I’m Astrax AI. Ask me anything.</div>

</div>

<div class="inputbox">
<input type="text" id="msg" placeholder="Message Astrax...">
<button onclick="sendMsg()">Send</button>
</div>

</div>
</div>

<script>
function sendMsg(){
let input=document.getElementById("msg");
let text=input.value.trim().toLowerCase();

if(text==="") return;

let chat=document.getElementById("chat");

chat.innerHTML += '<div class="user">'+text+'</div>';

let reply = "🤖 I am Astrax AI. How can I help you?";

if(text.includes("hi") || text.includes("hello")){
reply="👋 Hello! Welcome to Astrax AI.";
}
else if(text.includes("startup")){
reply="🚀 Startup Ideas: AI Agency, E-commerce Brand, SaaS Tool.";
}
else if(text.includes("coding")){
reply="💻 I can help with HTML, CSS, JavaScript and more.";
}
else if(text.includes("who are you")){
reply="🤖 I am Astrax AI, your smart assistant.";
}
else if(text.includes("money")){
reply="💰 You can earn through freelancing, business, content creation.";
}

chat.innerHTML += '<div class="bot">'+reply+'</div>';

chat.scrollTop = chat.scrollHeight;

input.value="";
}
let input=document.getElementById("msg");
let text=input.value.trim();

if(text==="") return;

let chat=document.getElementById("chat");

chat.innerHTML += '<div class="user">'+text+'</div>';

chat.innerHTML += '<div class="bot">🤖 Astrax is thinking...</div>';

chat.scrollTop = chat.scrollHeight;

input.value="";
}

function newChat(){
document.getElementById("chat").innerHTML =
'<div class="bot">👋 New chat started. Ask me anything.</div>';
}
</script>

</body>
</html>
